<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">QueueSmart Logo</title>
  <desc id="desc">A custom QueueSmart logo with a queue, time checkmark, and wordmark.</desc>
  <defs>
    <linearGradient id="qsIcon" x1="6" y1="8" x2="62" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="qsText" x1="153" y1="18" x2="226" y2="43" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <g transform="translate(3 3)">
    <!-- Rounded clock / queue flow icon -->
    <path d="M48 47.2C55.2 42.5 59.8 34.4 59.8 25.2C59.8 10.8 48.2 -0.8 33.8 -0.8C23.3 -0.8 14.3 5.4 10.2 14.3" stroke="url(#qsIcon)" stroke-width="6" stroke-linecap="round"/>
    <path d="M5.3 37.5C13.2 45.8 26.8 50.1 43.9 48.5C50.2 47.9 55.3 46.7 60.2 44.9" stroke="url(#qsIcon)" stroke-width="5" stroke-linecap="round"/>
    <path d="M56.7 50.8H66.3" stroke="#14B8A6" stroke-width="5" stroke-linecap="round"/>
    <path d="M67.4 50.8L58.1 43.5V58.1L67.4 50.8Z" fill="#14B8A6"/>

    <!-- Queue people -->
    <circle cx="11.3" cy="29" r="4.3" fill="#2563EB"/>
    <rect x="7" y="34.2" width="8.6" height="18" rx="4.3" fill="#2563EB"/>
    <circle cx="23" cy="30.8" r="4.9" fill="#0EA5E9"/>
    <rect x="18.1" y="36.5" width="9.8" height="20.2" rx="4.9" fill="#0EA5E9"/>
    <circle cx="35.2" cy="32.3" r="5.5" fill="#14B8A6"/>
    <rect x="29.7" y="38.7" width="11" height="22" rx="5.5" fill="#14B8A6"/>

    <!-- Time check -->
    <path d="M34.3 12.1V8.8" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
    <path d="M50.4 28.4H47" stroke="#14B8A6" stroke-width="3" stroke-linecap="round"/>
    <path d="M34.3 44.8V41.4" stroke="#14B8A6" stroke-width="3" stroke-linecap="round"/>
    <path d="M27.8 26.7L33.8 32.2L45.2 21.5" stroke="#14B8A6" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="72" y="42" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30" font-weight="800" letter-spacing="-1" fill="#0F3B73">Queue</text>
  <text x="154" y="42" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30" font-weight="800" letter-spacing="-1" fill="url(#qsText)">Smart</text>
</svg>
